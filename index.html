<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Letter for Nikki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
        }

        .envelope-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: white;
            border: 2px solid #333;
            border-radius: 5px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .envelope:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .envelope-flap {
            width: 300px;
            height: 100px;
            background: linear-gradient(to bottom, #ff6b6b, #ff5252);
            position: absolute;
            top: 0;
            left: 0;
            clip-path: polygon(0 0, 50% 50%, 100% 0);
            transition: all 0.6s ease;
            transform-origin: top center;
        }

        .envelope.opened .envelope-flap {
            transform: rotateX(180deg);
            z-index: -1;
        }

        .envelope-body {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }

        .message-content {
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
            max-width: 280px;
            padding: 20px;
            line-height: 1.6;
        }

        .envelope.opened .message-content {
            opacity: 1;
        }

        .message-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .footnote {
            font-size: 12px;
            color: #666;
            font-style: italic;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 15px;
        }

        .tap-instruction {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .reset-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: none;
        }

        .envelope.opened ~ .reset-button,
        .reset-button.show {
            display: inline-block;
        }

        .reset-button:hover {
            background: transparent;
            color: white;
        }

        .title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">💌 Important Letter 💌</div>
        <div class="envelope-container">
            <div class="envelope" id="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body">
                    <div class="message-content">
                        <div class="message-text">
                            Hi Nikki! I wanted to send you a special message in this digital envelope. Open it to see what I have to say! 💕
                        </div>
                        <div class="footnote">
                            ⚠️ PLEASE DON'T TELL THIS TO ANYBODY ⚠️
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tap-instruction" id="tapInstruction">
            👆 Tap the envelope to open
        </div>
        <button class="reset-button" id="resetButton">Open Another Message</button>
    </div>

    <script>
        const envelope = document.getElementById('envelope');
        const tapInstruction = document.getElementById('tapInstruction');
        const resetButton = document.getElementById('resetButton');

        envelope.addEventListener('click', function() {
            envelope.classList.toggle('opened');
            
            if (envelope.classList.contains('opened')) {
                tapInstruction.style.display = 'none';
                resetButton.classList.add('show');
            } else {
                tapInstruction.style.display = 'block';
                resetButton.classList.remove('show');
            }
        });

        resetButton.addEventListener('click', function(e) {
            e.stopPropagation();
            envelope.classList.remove('opened');
            tapInstruction.style.display = 'block';
            resetButton.classList.remove('show');
        });
    </script>
</body>
</html>
